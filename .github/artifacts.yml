# Artifacts Configuration 
# Gradle library published to Maven Central

artifacts:
  - name: android-access-mechanism
    project-type: gradle
    working-directory: .
    build-type: library
    publish-to:
      - maven-central
    config:
      java-version: 21
      gradle-tasks: build
      gradle-version-file: gradle.properties
      publish-tasks: publish
      setup-android: true
