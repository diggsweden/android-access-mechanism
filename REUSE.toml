    ".gitignore",
    "CHANGELOG.md",
    "README.md",
    "access-mechanism/.gitignore",
    "access-mechanism/proguard-rules.pro",
    "docs/DEVELOPMENT.md",
    "feature/home/.gitignore",
    "feature/home/consumer-rules.pro",
    "feature/home/proguard-rules.pro",
